name: Publish GitHub Pages

on:
  push:
    branches:
      - main
      - master
    paths:
      - "index.html"
      - "styles.css"
      - "robots.txt"
      - "sitemap.xml"
      - "assets/**"
      - "favicon.svg"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Validate static files
        run: |
          test -f index.html
          test -f styles.css
          test -f robots.txt
          test -f sitemap.xml

      - name: Upload static site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
